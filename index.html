<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Run Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#000000">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f4f4f4; }
        #map { height: 55vh; width: 100%; }
        #controls { height: 45vh; padding: 15px; box-sizing: border-box; overflow-y: scroll; background: #fff; border-top: 1px solid #ccc; }
        
        .stat-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat { background: #f8f9fa; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .label { font-size: 0.75em; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 1.4em; font-weight: bold; color: #333; }
        
        /* Update button slightly to fit grid */
        button { width: 100%; padding: 15px; font-size: 1em; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        /* NEW: Grid for side-by-side buttons */
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        button:active { opacity: 0.8; }
        
        #btn-start { background: #28a745; color: white; }
        #btn-stop { background: #dc3545; color: white; display: none; }
        #btn-photo { background: #007bff; color: white; }
        
        /* Hidden by default */
        #btn-download { background: #343a40; color: white; display: none; }
        #btn-download-safe { background: #6c757d; color: white; display: none; font-size: 0.9em; }
        #btn-chart { background: #17a2b8; color: white; display: none; }
        
        #camera-input { display: none; }
        
        #chart-container { display: none; width: 100%; height: 250px; margin-top: 15px; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div id="controls">
        <div class="stat-box">
            <div class="stat"><div class="label">Time</div><div class="value" id="time">00:00</div></div>
            <div class="stat"><div class="label">Dist (m)</div><div class="value" id="dist">0</div></div>
            <div class="stat"><div class="label">Vel (m/s)</div><div class="value" id="vel">0.0</div></div>
            <div class="stat"><div class="label">Accel (m/s²)</div><div class="value" id="acc">0.0</div></div>
        </div>

    <button id="btn-start" onclick="toggleTracking(true)">Start Run</button>
    <button id="btn-stop" onclick="toggleTracking(false)">Stop Run</button>

    <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handlePhoto(this)">
    <button id="btn-photo" onclick="document.getElementById('camera-input').click()">Take Photo</button>

    <button id="btn-chart" onclick="toggleCharts()">Show Charts</button>

    <div class="button-grid">
        <button id="btn-download" onclick="downloadRun(true)">Save Full (Partial)</button>
        <button id="btn-download-safe" onclick="downloadRun(false)">Save Track (Partial)</button>
    </div>

    <button id="btn-save-reset" onclick="saveAndReset()" style="background-color: #d9534f; color: white;">End Session & Reset</button>
        
        <div id="chart-container">
            <canvas id="runChart"></canvas>
        </div>
    </div>

    <script>
        // --- 1. SETUP MAP ---
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const pathLayer = L.polyline([], {color: '#dc3545', weight: 5}).addTo(map);
        
        // --- 2. DATA STORAGE ---
        let trackData = []; 
        let photoData = [];
        
        let watchID = null;
        let tracking = false;
        let startTime = null;
        let lastPos = null;
        let lastTime = null;
        let totalDistance = 0;
        let myChart = null;

        let currentHeading = 0; // Stores compass direction (0-360)
        
        // --- 3. TRACKING LOGIC ---
        function toggleTracking(start) {
            tracking = start;
            const btnStart = document.getElementById('btn-start');
            const btnStop = document.getElementById('btn-stop');
            const btnDownload = document.getElementById('btn-download');
            const btnDownloadSafe = document.getElementById('btn-download-safe');
            const btnChart = document.getElementById('btn-chart');

            if (start) {
                // Starting Fresh? Reset data
                if (!startTime) {
                    startTime = Date.now();
                    trackData = [];
                    photoData = [];
                    pathLayer.setLatLngs([]);
                    totalDistance = 0;
                    document.getElementById('dist').innerText = "0";
                }

                btnStart.style.display = 'none';
                btnStop.style.display = 'block';
                
                // Hide post-run buttons while running
                btnDownload.style.display = 'none';
                btnDownloadSafe.style.display = 'none';
                btnChart.style.display = 'none';
                document.getElementById('chart-container').style.display = 'none';
                // Request Compass Permission (Required for iOS 13+)
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    })
                    .catch(console.error);
                } else {
                    // Non-iOS devices usually just work
                    window.addEventListener('deviceorientation', handleOrientation);
                }
                
                if (navigator.geolocation) {
                    watchID = navigator.geolocation.watchPosition(
                        updatePosition, 
                        (err) => console.error(err), 
                        { enableHighAccuracy: true, maximumAge: 1000 }
                    );
                }
                
            } else {
                // STOPPED
                btnStart.style.display = 'block';
                btnStart.innerText = "Resume Run";
                btnStop.style.display = 'none';
                
                // Show post-run buttons
                btnDownload.style.display = 'block';
                btnDownloadSafe.style.display = 'block';
                btnChart.style.display = 'block';

                // Stop listening to compass to save battery
                window.removeEventListener('deviceorientation', handleOrientation);
                if (watchID) navigator.geolocation.clearWatch(watchID);
                watchID = null;
            }
        }

        // NEW: Helper function to read compass
        function handleOrientation(event) {
            // iOS uses webkitCompassHeading, Android uses alpha
            if (event.webkitCompassHeading) {
                currentHeading = event.webkitCompassHeading;
            } else if (event.alpha) {
                currentHeading = 360 - event.alpha;
            }
        }

        function updatePosition(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const currentTime = position.timestamp;
            let v_current = position.coords.speed || 0; 
            let acceleration = 0;

            if (lastPos && lastTime) {
                const timeDiff = (currentTime - lastTime) / 1000; 
                const v_prev = lastPos.speed || 0;
                
                if (timeDiff > 0 && timeDiff < 10) { 
                    acceleration = (v_current - v_prev) / timeDiff;
                    const distStep = map.distance([lastPos.latitude, lastPos.longitude], [lat, lng]);
                    totalDistance += distStep;
                }
            }

            document.getElementById('vel').innerText = v_current.toFixed(1);
            document.getElementById('acc').innerText = acceleration.toFixed(2);
            document.getElementById('dist').innerText = Math.round(totalDistance);
            
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const secs = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('time').innerText = `${mins}:${secs}`;

            pathLayer.addLatLng([lat, lng]);
            map.setView([lat, lng], 18);

            trackData.push({
                time: elapsed,
                lat: lat,
                lng: lng,
                vel: v_current,
                acc: acceleration
            });

            lastPos = { latitude: lat, longitude: lng, speed: v_current };
            lastTime = currentTime;
        }

        // --- 4. PHOTO LOGIC ---
        function handlePhoto(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const reader = new FileReader();

                reader.onload = function(e) {
                    const imgData = e.target.result;
                    
                    const photoIcon = L.divIcon({
                        html: `<div style="background-image: url('${imgData}'); width: 40px; height: 40px; background-size: cover; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 5px black;"></div>`,
                        className: 'photo-marker',
                        iconSize: [44, 44],
                        iconAnchor: [22, 44]
                    });

                    const lat = lastPos ? lastPos.latitude : map.getCenter().lat;
                    const lng = lastPos ? lastPos.longitude : map.getCenter().lng;

                    L.marker([lat, lng], {icon: photoIcon})
                        .addTo(map)
                        .bindPopup(`<img src="${imgData}" style="width:100px;">`);
                    
                    photoData.push({
                        lat: lat,
                        lng: lng,
                        heading: Math.round(currentHeading || 0), //new
                        src: imgData, 
                        timestamp: Date.now()
                    });
                }
                reader.readAsDataURL(file);
            }
        }

        // --- 5. EXPORT LOGIC (FIXED) ---
    function downloadRun(includePhotos) {
        const dataObj = {
            date: new Date().toISOString(),
            total_dist: totalDistance,
            duration: document.getElementById('time').innerText,
            track_points: trackData,
            photos: includePhotos ? photoData : [] 
        };

        const jsonStr = JSON.stringify(dataObj);
        const blob = new Blob([jsonStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
    
        // NEW: Readable Timestamp for Filename (YYYY-MM-DD_HH-MM-SS)
        const now = new Date();
        const timeString = now.getFullYear() + "-" + 
                      String(now.getMonth()+1).padStart(2, '0') + "-" + 
                      String(now.getDate()).padStart(2, '0') + "_" + 
                      String(now.getHours()).padStart(2, '0') + "-" + 
                      String(now.getMinutes()).padStart(2, '0') + "-" + 
                      String(now.getSeconds()).padStart(2, '0');

        const type = includePhotos ? "FULL_DATA" : "TRACK_ONLY";
        const filename = `Run_${timeString}_${type}.json`; // e.g., Run_2025-01-03_14-44-50_FULL_DATA.json

        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    
        setTimeout(() => URL.revokeObjectURL(url), 100);
    }
        // --- SAVE & RESET FUNCTION ---
        function saveAndReset() {
            // 1. Trigger the download and set input argument to true to ensure photos are saved
            downloadRun(true); 
            
            // 2. Wait a moment to ensure the download handoff begins, then refresh
            setTimeout(() => {
                // use a confirm box to prevent accidental refreshing if the download doesn't work
                if(confirm("Did the file download start? Press OK to clear memory for the next run.")) {
                    window.location.reload(); // This performs the "Flush"
                }
            }, 1000); // 1 second delay
        }
        
        // --- 6. CHART LOGIC ---
        function toggleCharts() {
            const container = document.getElementById('chart-container');
            const btn = document.getElementById('btn-chart');
            
            if (container.style.display === 'none' || container.style.display === '') {
                container.style.display = 'block';
                btn.innerText = "Hide Charts";
                renderChart(); 
                document.getElementById('controls').scrollTop = document.getElementById('controls').scrollHeight;
            } else {
                container.style.display = 'none';
                btn.innerText = "Show Charts";
            }
        }

        function renderChart() {
            const ctx = document.getElementById('runChart').getContext('2d');
            const labels = trackData.map(p => p.time + 's'); 
            const velData = trackData.map(p => p.vel);      
            const accData = trackData.map(p => p.acc);      

            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Velocity (m/s)',
                            data: velData,
                            borderColor: '#007bff',
                            backgroundColor: 'rgba(0,123,255,0.1)',
                            yAxisID: 'y',
                            tension: 0.4,
                            pointRadius: 0,
                            fill: true
                        },
                        {
                            label: 'Accel (m/s²)',
                            data: accData,
                            borderColor: '#dc3545',
                            yAxisID: 'y1',
                            tension: 0.4,
                            pointRadius: 0,
                            borderDash: [5, 5],
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { display: false },
                        y: { type: 'linear', display: true, position: 'left', min: 0 },
                        y1: { type: 'linear', display: false, position: 'right', grid: { drawOnChartArea: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
