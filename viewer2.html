<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Run Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
    
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #111; color: #eee; }
        #controls { padding: 15px; background: #222; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
        #map { flex-grow: 1; min-height: 50vh; }
        #charts { height: 35vh; background: #1a1a1a; padding: 10px; border-top: 1px solid #444; }
        input[type="file"] { color: white; }
        .stat-value { color: #4facfe; font-weight: bold; margin-left: 5px; }
        
        /* Custom Photo Marker */
        .photo-marker {
            transition: transform 0.3s;
        }
        .photo-marker:hover {
            transform: scale(1.2);
            z-index: 1000 !important;
        }
        .active-photo {
            border-color: #ffd700 !important;
            box-shadow: 0 0 15px #ffd700 !important;
            transform: scale(1.3);
            z-index: 9999 !important;
        }
    </style>
</head>
<body>

    <div id="controls">
        <div>
            <h2 style="margin:0; font-size: 1.2em;">🏃 Run Visualizer</h2>
            <input type="file" id="fileInput" accept=".json" style="margin-top: 5px;">
        </div>
        <div id="stats" style="text-align: right; font-size: 0.85em; color: #aaa;">
            <div>Time: <span id="syncTime" class="stat-value">--:--</span></div>
            <div>Vel: <span id="syncVel" class="stat-value">0.0</span> m/s</div>
        </div>
    </div>

    <div id="map"></div>
    <div id="charts">
        <canvas id="runChart"></canvas>
    </div>

    <script>
        // --- SETUP ---
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
            attribution: '© OSM',
            className: 'map-tiles' 
        }).addTo(map);
        
        // Darken map tiles via CSS filter
        document.querySelector('.map-tiles').style.filter = "invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%)";

        const pathLayer = L.polyline([], {color: '#4facfe', weight: 4}).addTo(map);
        const runnerMarker = L.circleMarker([0,0], { radius: 8, color: 'white', fillColor: '#ff0055', fillOpacity: 1 }).addTo(map);
        
        let myChart = null;
        let runData = null;
        let photoMarkers = [];
        
        // --- 1. LOAD FILE ---
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                runData = JSON.parse(event.target.result);
                initVisualizer(runData);
            };
            reader.readAsText(file);
        });

        function initVisualizer(data) {
            // A. Draw Path
            const latlngs = data.track_points.map(p => [p.lat, p.lng]);
            pathLayer.setLatLngs(latlngs);
            if (latlngs.length > 0) {
                map.fitBounds(pathLayer.getBounds());
                runnerMarker.setLatLng(latlngs[0]);
            }

            // B. Add Photos
            if (data.photos) {
                data.photos.forEach((photo, index) => {
                    const icon = L.divIcon({
                        html: `<div style="background-image: url('${photo.src}'); width: 40px; height: 40px; background-size: cover; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 5px black;"></div>`,
                        className: 'photo-marker',
                        iconSize: [44, 44],
                        iconAnchor: [22, 44]
                    });
                    
                    // Match photo to nearest track point to calculate "Run Time" for this photo
                    // (Assuming photo.timestamp is standard epoch, and track_points have 'time' offset)
                    // Simple approximation: Find closest lat/lng in track
                    let closestTime = 0;
                    let minDist = Infinity;
                    data.track_points.forEach(p => {
                        const d = Math.sqrt(Math.pow(p.lat - photo.lat, 2) + Math.pow(p.lng - photo.lng, 2));
                        if(d < minDist) { minDist = d; closestTime = p.time; }
                    });

                    const marker = L.marker([photo.lat, photo.lng], {icon: icon}).addTo(map);
                    marker.bindPopup(`<img src="${photo.src}" style="width:250px; border-radius: 8px;">`, { autoClose: false });
                    
                    photoMarkers.push({ 
                        marker: marker, 
                        runTime: closestTime,
                        isOpen: false
                    });
                });
            }

            // C. Draw Charts
            const ctx = document.getElementById('runChart').getContext('2d');
            
            if (myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.track_points.map(p => p.time), // X-Axis is real Run Seconds
                    datasets: [
                        { 
                            label: 'Velocity (m/s)', 
                            data: data.track_points.map(p => p.vel), 
                            borderColor: '#4facfe', 
                            borderWidth: 1, 
                            pointRadius: 0,
                            yAxisID: 'y'
                        },
                        { 
                            label: 'Accel (m/s²)', 
                            data: data.track_points.map(p => p.acc), 
                            borderColor: '#ff0055', 
                            borderWidth: 1, 
                            borderDash: [2, 2], 
                            pointRadius: 0,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { display: true, ticks: { color: '#666' } },
                        y: { position: 'left', ticks: { color: '#4facfe' } },
                        y1: { position: 'right', grid: { display: false }, ticks: { color: '#ff0055' } }
                    },
                    plugins: {
                        annotation: {
                            annotations: {
                                line1: {
                                    type: 'line',
                                    xMin: 0,
                                    xMax: 0,
                                    borderColor: 'white',
                                    borderWidth: 2,
                                }
                            }
                        }
                    }
                }
            });
        }

        // --- 2. SYNC LOGIC (The Magic) ---
        window.addEventListener('message', function(event) {
            // Check message type
            if (event.data.type !== 'run_viewer_sync' || !runData) return;

            const { currentTime, totalDuration } = event.data;
            if (totalDuration <= 0) return;

            // 1. Calculate Scaling
            // Video Progress (0.0 to 1.0)
            const progress = currentTime / totalDuration;
            
            // Map to Run Time
            const maxRunTime = runData.track_points[runData.track_points.length - 1].time;
            const currentRunTime = progress * maxRunTime;

            // 2. Update UI Stats
            document.getElementById('syncTime').innerText = formatTime(currentRunTime);

            // 3. Find Data Point at this time
            // Simple optimization: Just iterate or findIndex. For <10k points, simple find is fast enough.
            const point = runData.track_points.find(p => p.time >= currentRunTime) || runData.track_points[runData.track_points.length-1];
            
            if (point) {
                // Update Runner Marker
                runnerMarker.setLatLng([point.lat, point.lng]);
                
                // Update Velocity Text
                document.getElementById('syncVel').innerText = point.vel.toFixed(1);
            }

            // 4. Update Chart Cursor
            if (myChart) {
                myChart.options.plugins.annotation.annotations.line1.xMin = currentRunTime;
                myChart.options.plugins.annotation.annotations.line1.xMax = currentRunTime;
                myChart.update('none'); // Efficient update
            }

            // 5. Trigger Photos (Display for k seconds)
            const PHOTO_DISPLAY_WINDOW = 15; // Show photo if we are within 15 seconds (Run Time) of it
            
            photoMarkers.forEach(pm => {
                const dist = Math.abs(pm.runTime - currentRunTime);
                const markerIcon = pm.marker.getElement();

                if (dist < PHOTO_DISPLAY_WINDOW) {
                    if (!pm.isOpen) {
                        pm.marker.openPopup();
                        if(markerIcon) markerIcon.classList.add('active-photo');
                        pm.isOpen = true;
                    }
                } else {
                    if (pm.isOpen) {
                        pm.marker.closePopup();
                        if(markerIcon) markerIcon.classList.remove('active-photo');
                        pm.isOpen = false;
                    }
                }
            });
        });

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
